<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoetraNuri ERP | Logistics Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { navy: '#0f172a', gold: '#d4af37' },
                    borderRadius: { '4xl': '2rem', '5xl': '2.5rem' }
                }
            }
        }
    </script>

    <style>
        :root { --navy: #0f172a; --gold: #d4af37; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; overflow-x: hidden; }
        .sidebar-active { background: rgba(212, 175, 55, 0.15); border-right: 4px solid var(--gold); color: var(--gold) !important; }
        .glass { backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        #reader { border-radius: 20px; overflow: hidden; border: 4px solid #f59e0b !important; }
        .loader-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-300">

    <div id="mainLoader" class="loader-overlay">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-slate-700 border-t-amber-500 rounded-full animate-spin mx-auto mb-4"></div>
            <h2 class="text-white font-black tracking-widest text-xl uppercase">PoetraNuri ERP</h2>
        </div>
    </div>

    <div id="app" class="hidden min-h-screen flex flex-col">
        
        <div id="loginPage" class="fixed inset-0 z-[200] bg-slate-900 flex items-center justify-center p-4">
            <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-5xl shadow-2xl p-10">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-amber-500 rounded-3xl mx-auto flex items-center justify-center text-white text-2xl font-black mb-4">P</div>
                    <h2 class="text-2xl font-black dark:text-white uppercase">Workspace Access</h2>
                    <p class="text-slate-500 text-sm mt-2">Masuk dengan kode akses 12345</p>
                </div>
                <form id="loginForm" class="space-y-4">
                    <select id="loginRole" class="w-full px-5 py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 dark:text-white">
                        <option value="Administrator">Administrator</option>
                        <option value="Staff Gudang">Warehouse / Logistics</option>
                        <option value="Finance">Finance</option>
                    </select>
                    <input type="password" id="loginPass" value="12345" class="w-full px-5 py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 dark:text-white" placeholder="Passcode">
                    <button type="submit" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black text-lg shadow-lg shadow-amber-500/20">SIGN IN</button>
                </form>
            </div>
        </div>

        <div id="mainUI" class="hidden flex flex-1 overflow-hidden h-screen">
            <!-- Sidebar -->
            <aside id="sidebar" class="w-72 bg-slate-950 text-slate-400 flex flex-col transition-all duration-300 no-print z-20">
                <div class="p-8 flex items-center space-x-3">
                    <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-white font-black">P</div>
                    <span class="text-white font-bold text-xl tracking-tight sidebar-txt">PoetraNuri</span>
                </div>

                <nav class="flex-1 overflow-y-auto px-4 space-y-1 custom-scroll">
                    <a href="#" onclick="route('dashboard')" data-route="dashboard" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-2xl hover:bg-slate-900 transition-all">
                        <i class="fa fa-chart-pie w-5"></i> <span class="sidebar-txt">Dashboard</span>
                    </a>
                    
                    <p class="px-4 text-[10px] font-black uppercase text-slate-600 mb-2 mt-6 sidebar-txt">Supply Chain</p>
                    <a href="#" onclick="route('logistics')" data-route="logistics" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-2xl hover:bg-slate-900 transition-all">
                        <i class="fa fa-barcode w-5"></i> <span class="sidebar-txt">Scan Logistik</span>
                    </a>
                    <a href="#" onclick="route('warehouse')" data-route="warehouse" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-2xl hover:bg-slate-900 transition-all">
                        <i class="fa fa-boxes w-5"></i> <span class="sidebar-txt">Warehouse</span>
                    </a>

                    <p class="px-4 text-[10px] font-black uppercase text-slate-600 mb-2 mt-6 sidebar-txt">Sales</p>
                    <a href="#" onclick="route('sales')" data-route="sales" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-2xl hover:bg-slate-900 transition-all">
                        <i class="fa fa-cash-register w-5"></i> <span class="sidebar-txt">Sales POS</span>
                    </a>
                    <a href="#" onclick="route('sales-report')" data-route="sales-report" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-2xl hover:bg-slate-900 transition-all">
                        <i class="fa fa-file-invoice-dollar w-5"></i> <span class="sidebar-txt">Laporan Penjualan</span>
                    </a>

                    <p class="px-4 text-[10px] font-black uppercase text-slate-600 mb-2 mt-6 sidebar-txt">Corporate</p>
                    <a href="#" onclick="route('hrd')" data-route="hrd" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-2xl hover:bg-slate-900 transition-all">
                        <i class="fa fa-user-tie w-5"></i> <span class="sidebar-txt">HRD & Payroll</span>
                    </a>
                    <a href="#" onclick="route('finance')" data-route="finance" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-2xl hover:bg-slate-900 transition-all">
                        <i class="fa fa-vault w-5"></i> <span class="sidebar-txt">Finance</span>
                    </a>

                    <a href="#" onclick="route('settings')" data-route="settings" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-2xl hover:bg-slate-900 transition-all mt-6">
                        <i class="fa fa-cog w-5"></i> <span class="sidebar-txt">Settings</span>
                    </a>
                </nav>

                <div class="p-6 border-t border-slate-900">
                    <button onclick="logout()" class="w-full py-3 text-rose-500 hover:bg-rose-500/10 rounded-2xl flex items-center justify-center space-x-2 font-bold transition-all">
                        <i class="fa fa-power-off"></i> <span class="sidebar-txt">Logout</span>
                    </button>
                </div>
            </aside>

            <!-- Main Workspace -->
            <main class="flex-1 flex flex-col overflow-hidden relative">
                <header class="h-20 bg-white/80 dark:bg-slate-900/80 glass border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 z-10 no-print">
                    <div class="flex items-center space-x-4">
                        <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl">
                            <i class="fa fa-bars text-xl"></i>
                        </button>
                        <h2 id="pageTitle" class="text-lg font-black text-slate-800 dark:text-white uppercase">Dashboard</h2>
                    </div>

                    <div class="flex items-center space-x-4">
                        <div class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-2xl p-1">
                            <select id="globalDateFilter" onchange="applyGlobalFilter()" class="bg-transparent border-none outline-none px-4 py-1.5 text-xs font-bold text-slate-600 dark:text-slate-300 cursor-pointer">
                                <option value="today">Today</option>
                                <option value="yesterday">Yesterday</option>
                                <option value="last7">Last 7 Days</option>
                                <option value="last30">Last 30 Days</option>
                                <option value="thisMonth">This Month</option>
                                <option value="thisYear">This Year</option>
                                <option value="custom">Custom Range</option>
                            </select>
                        </div>
                        
                        <div id="customDateRange" class="hidden flex items-center space-x-2">
                            <input type="date" id="dateFrom" class="text-xs border rounded-lg px-2 py-1 dark:bg-slate-800 dark:border-slate-700">
                            <input type="date" id="dateTo" class="text-xs border rounded-lg px-2 py-1 dark:bg-slate-800 dark:border-slate-700">
                            <button onclick="applyGlobalFilter()" class="bg-slate-900 text-white p-1 rounded-lg"><i class="fa fa-check text-[10px]"></i></button>
                        </div>

                        <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-amber-500">
                            <i id="themeIcon" class="fa fa-moon"></i>
                        </button>
                        
                        <div class="h-10 w-[1px] bg-slate-200 dark:bg-slate-800 mx-2"></div>
                        <div class="flex items-center space-x-3">
                            <div class="text-right hidden sm:block">
                                <p id="userNameDisplay" class="text-xs font-black text-slate-800 dark:text-white">User</p>
                                <p id="userRoleDisplay" class="text-[10px] text-amber-500 font-bold uppercase">Role</p>
                            </div>
                        </div>
                    </div>
                </header>

                <div id="content" class="flex-1 overflow-y-auto p-8 custom-scroll bg-slate-50 dark:bg-slate-950 transition-colors">
                    <!-- Dynamic Content -->
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[150] hidden items-center justify-center p-4">
        <div id="modalBox" class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-5xl shadow-2xl overflow-hidden transform scale-95 opacity-0 transition-all duration-300">
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const DB = {
            init: () => {
                const keys = ['warehouse', 'sales', 'employees', 'finance', 'purchasing', 'receipts'];
                keys.forEach(k => { if(!localStorage.getItem(`pn_${k}`)) localStorage.setItem(`pn_${k}`, JSON.stringify([])); });
            },
            get: (key) => JSON.parse(localStorage.getItem(`pn_${key}`)) || [],
            set: (key, data) => localStorage.setItem(`pn_${key}`, JSON.stringify(data)),
            add: (key, obj) => {
                const data = DB.get(key);
                obj.id = Date.now();
                obj.createdAt = new Date().toISOString();
                data.push(obj);
                DB.set(key, data);
                return obj;
            },
            delete: (key, id) => {
                const data = DB.get(key).filter(item => item.id != id);
                DB.set(key, data);
            }
        };

        let state = {
            currentPage: 'dashboard',
            currentUser: null,
            filter: 'today',
            dateRange: { from: null, to: null },
            theme: 'light',
            cart: [],
            scanner: null,
            lastScannedResi: '',
            lastScanTime: 0,
            logFilters: { time: '', resi: '', courier: '', status: '' }
        };

        const AudioNotify = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(type) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                if(type === 'success') {
                    osc.frequency.setValueAtTime(880, this.ctx.currentTime);
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.2);
                } else {
                    osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                    osc.type = 'sawtooth';
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.4);
                }
            }
        };

        function route(page) {
            if(state.scanner) { stopScanner(); }
            state.currentPage = page;
            const container = document.getElementById('content');
            const title = document.getElementById('pageTitle');
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('sidebar-active'));
            const activeNav = document.querySelector(`[data-route="${page}"]`);
            if(activeNav) activeNav.classList.add('sidebar-active');

            title.innerText = page.replace('-', ' ');
            container.innerHTML = `<div class="flex justify-center py-20"><div class="w-10 h-10 border-4 border-slate-200 border-t-amber-500 rounded-full animate-spin"></div></div>`;

            setTimeout(() => {
                switch(page) {
                    case 'dashboard': renderDashboard(container); break;
                    case 'logistics': renderLogistics(container); break;
                    case 'warehouse': renderWarehouse(container); break;
                    case 'sales': renderSales(container); break;
                    case 'sales-report': renderSalesReport(container); break;
                    case 'hrd': renderHRD(container); break;
                    case 'finance': renderFinance(container); break;
                    case 'settings': renderSettings(container); break;
                }
            }, 300);
        }

        function renderLogistics(container) {
            const allData = filterByDate(DB.get('receipts'));
            
            // Apply column filters
            const filteredData = allData.filter(item => {
                const dateStr = new Date(item.createdAt).toLocaleString().toLowerCase();
                const resiStr = item.resiNumber.toLowerCase();
                const courierStr = item.courier.toLowerCase();
                const statusStr = item.status.toLowerCase();

                return dateStr.includes(state.logFilters.time.toLowerCase()) &&
                       resiStr.includes(state.logFilters.resi.toLowerCase()) &&
                       courierStr.includes(state.logFilters.courier.toLowerCase()) &&
                       statusStr.includes(state.logFilters.status.toLowerCase());
            });

            container.innerHTML = `
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    <div class="space-y-6">
                        <div class="bg-white dark:bg-slate-900 p-8 rounded-4xl border dark:border-slate-800 shadow-sm">
                            <h3 class="text-xl font-black uppercase text-slate-800 dark:text-white mb-6">Continuous Scanner</h3>
                            <div id="reader" class="w-full bg-slate-100 dark:bg-slate-800 min-h-[300px] mb-4 flex items-center justify-center text-slate-400">
                                <i class="fa fa-camera text-4xl"></i>
                            </div>
                            <div class="flex space-x-2">
                                <button onclick="startScanner()" id="startBtn" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-black shadow-lg shadow-amber-500/20">ACTIVATE CAMERA</button>
                                <button onclick="stopScanner()" id="stopBtn" class="hidden flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black">STOP</button>
                            </div>
                        </div>

                        <div class="bg-white dark:bg-slate-900 p-8 rounded-4xl border dark:border-slate-800 shadow-sm">
                            <h3 class="text-sm font-black uppercase text-slate-400 mb-4">Manual Input</h3>
                            <div class="space-y-4">
                                <input type="text" id="resiInput" placeholder="Ketik nomor resi..." class="w-full p-4 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 font-mono" onkeypress="if(event.key==='Enter') processResiManual()">
                                <div class="grid grid-cols-2 gap-4">
                                    <select id="resiCourier" class="p-4 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl outline-none"><option>JNE</option><option>J&T</option><option>Sicepat</option><option>Ninja</option></select>
                                    <select id="resiStatus" class="p-4 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-2xl outline-none"><option>IN</option><option>OUT</option></select>
                                </div>
                                <button onclick="processResiManual()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">SUBMIT</button>
                            </div>
                        </div>
                    </div>

                    <div class="xl:col-span-2 bg-white dark:bg-slate-900 rounded-4xl border dark:border-slate-800 shadow-sm flex flex-col overflow-hidden">
                        <div class="p-8 border-b dark:border-slate-800 flex justify-between items-center">
                            <h3 class="text-xl font-black uppercase text-slate-800 dark:text-white">Logistics Data History</h3>
                            <button onclick="exportCSV('logTable', 'logistics_report.csv')" class="px-6 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-xs font-bold dark:text-white">EXPORT CSV</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table id="logTable" class="w-full text-left">
                                <thead class="bg-slate-50 dark:bg-slate-800 text-[10px] font-black text-slate-400 uppercase">
                                    <tr>
                                        <th class="px-8 py-4">Time</th>
                                        <th class="px-8 py-4">Resi No.</th>
                                        <th class="px-8 py-4">Courier</th>
                                        <th class="px-8 py-4">Status</th>
                                        <th class="px-8 py-4 text-center">Delete</th>
                                    </tr>
                                    <tr class="bg-white dark:bg-slate-900 border-b dark:border-slate-800">
                                        <td class="px-4 py-2"><input type="text" value="${state.logFilters.time}" oninput="updateLogFilter('time', this.value)" placeholder="Search Time..." class="w-full px-2 py-1 text-[10px] bg-slate-50 dark:bg-slate-800 rounded-lg outline-none"></td>
                                        <td class="px-4 py-2"><input type="text" value="${state.logFilters.resi}" oninput="updateLogFilter('resi', this.value)" placeholder="Search Resi..." class="w-full px-2 py-1 text-[10px] bg-slate-50 dark:bg-slate-800 rounded-lg outline-none"></td>
                                        <td class="px-4 py-2"><input type="text" value="${state.logFilters.courier}" oninput="updateLogFilter('courier', this.value)" placeholder="Search Courier..." class="w-full px-2 py-1 text-[10px] bg-slate-50 dark:bg-slate-800 rounded-lg outline-none"></td>
                                        <td class="px-4 py-2"><input type="text" value="${state.logFilters.status}" oninput="updateLogFilter('status', this.value)" placeholder="Search Status..." class="w-full px-2 py-1 text-[10px] bg-slate-50 dark:bg-slate-800 rounded-lg outline-none"></td>
                                        <td></td>
                                    </tr>
                                </thead>
                                <tbody class="divide-y dark:divide-slate-800">
                                    ${filteredData.map(r => `
                                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50">
                                            <td class="px-8 py-4 text-[10px] text-slate-400">${new Date(r.createdAt).toLocaleString()}</td>
                                            <td class="px-8 py-4 text-xs font-black dark:text-white uppercase">${r.resiNumber}</td>
                                            <td class="px-8 py-4 text-[10px] uppercase font-bold text-amber-600">${r.courier}</td>
                                            <td class="px-8 py-4">
                                                <span class="px-2 py-1 rounded-md text-[9px] font-black ${r.status === 'IN' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-blue-500/10 text-blue-500'}">${r.status}</span>
                                            </td>
                                            <td class="px-8 py-4 text-center">
                                                <button onclick="deleteItem('receipts', ${r.id})" class="text-slate-300 hover:text-rose-500 transition-colors"><i class="fa fa-trash text-xs"></i></button>
                                            </td>
                                        </tr>
                                    `).reverse().join('') || '<tr><td colspan="5" class="p-10 text-center text-slate-400">Data not found</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateLogFilter(key, val) {
            state.logFilters[key] = val;
            renderLogistics(document.getElementById('content'));
        }

        function startScanner() {
            AudioNotify.init();
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('stopBtn').classList.remove('hidden');

            state.scanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            state.scanner.start({ facingMode: "environment" }, config, (decodedText) => {
                const now = Date.now();
                // Cooldown: prevent same resi from scanning twice within 2 seconds
                if(decodedText === state.lastScannedResi && (now - state.lastScanTime < 2000)) return;

                state.lastScannedResi = decodedText;
                state.lastScanTime = now;
                
                processResiScan(decodedText, document.getElementById('resiCourier').value, document.getElementById('resiStatus').value);
            }).catch(err => {
                Swal.fire('Camera Error', 'Gagal mengakses kamera: ' + err, 'error');
                stopScanner();
            });
        }

        function stopScanner() {
            if(state.scanner) {
                state.scanner.stop().then(() => {
                    state.scanner = null;
                    document.getElementById('startBtn').classList.remove('hidden');
                    document.getElementById('stopBtn').classList.add('hidden');
                });
            }
        }

        function processResiScan(resi, courier, status) {
            const resiClean = resi.trim().toUpperCase();
            if(!resiClean) return;

            const existing = DB.get('receipts');
            if(existing.find(r => r.resiNumber === resiClean)) {
                AudioNotify.play('error');
                // Toast to avoid breaking continuous flow with SweetAlert popup
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
                Toast.fire({ icon: 'error', title: 'DUPLICATE: ' + resiClean });
                return;
            }

            AudioNotify.play('success');
            DB.add('receipts', { resiNumber: resiClean, courier: courier, status: status });
            
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
            Toast.fire({ icon: 'success', title: 'LOGGED: ' + resiClean });
            
            if(state.currentPage === 'logistics') renderLogistics(document.getElementById('content'));
        }

        function processResiManual() {
            const input = document.getElementById('resiInput');
            const courier = document.getElementById('resiCourier').value;
            const status = document.getElementById('resiStatus').value;
            processResiScan(input.value, courier, status);
            input.value = '';
            input.focus();
        }

        function renderDashboard(container) {
            const sales = filterByDate(DB.get('sales'));
            const revenue = sales.reduce((a, b) => a + b.grandTotal, 0);
            const inventory = DB.get('warehouse');
            const staff = DB.get('employees');

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    ${renderStatCard('Total Revenue', `Rp ${revenue.toLocaleString()}`, 'fa-money-bill-wave', 'amber')}
                    ${renderStatCard('Logistics Scans', `${filterByDate(DB.get('receipts')).length}`, 'fa-barcode', 'blue')}
                    ${renderStatCard('Stock Items', `${inventory.reduce((a, b) => a + b.stock, 0)}`, 'fa-box', 'rose')}
                    ${renderStatCard('Team Members', `${staff.length}`, 'fa-users', 'emerald')}
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white dark:bg-slate-900 p-8 rounded-4xl border dark:border-slate-800">
                        <h4 class="font-black text-slate-800 dark:text-white uppercase mb-8">Revenue Analysis</h4>
                        <div id="chartMain"></div>

        function logout() { location.reload(); }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if(html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                state.theme = 'light';
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                state.theme = 'dark';
            }
            localStorage.setItem('pn_theme', state.theme);
            if(['dashboard', 'logistics'].includes(state.currentPage)) route(state.currentPage);
        }

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const txt = document.querySelectorAll('.sidebar-txt');
            if(s.classList.contains('w-72')) { s.classList.replace('w-72', 'w-20'); txt.forEach(t => t.classList.add('hidden')); }
            else { s.classList.replace('w-20', 'w-72'); txt.forEach(t => t.classList.remove('hidden')); }
        }

        function filterByDate(data) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            return data.filter(item => {
                const itemDate = new Date(item.createdAt);
                const itemDay = new Date(itemDate.getFullYear(), itemDate.getMonth(), itemDate.getDate());
                switch(state.filter) {
                    case 'today': return itemDay.getTime() === today.getTime();
                    case 'yesterday':
                        const yest = new Date(today); yest.setDate(today.getDate() - 1);
                        return itemDay.getTime() === yest.getTime();
                    case 'last7':
                        const l7 = new Date(today); l7.setDate(today.getDate() - 7);
                        return itemDate >= l7;
                    case 'last30':
                        const l30 = new Date(today); l30.setDate(today.getDate() - 30);
                        return itemDate >= l30;
                    case 'thisMonth':
                        return itemDate.getMonth() === now.getMonth() && itemDate.getFullYear() === now.getFullYear();
                    case 'thisYear':
                        return itemDate.getFullYear() === now.getFullYear();
                    case 'custom':
                        if(!state.dateRange.from || !state.dateRange.to) return true;
                        return itemDate >= new Date(state.dateRange.from) && itemDate <= new Date(state.dateRange.to + 'T23:59:59');
                    default: return true;
                }
            });
        }

        function applyGlobalFilter() {
            state.filter = document.getElementById('globalDateFilter').value;
            const customBox = document.getElementById('customDateRange');
            if(state.filter === 'custom') {
                customBox.classList.remove('hidden');
                state.dateRange.from = document.getElementById('dateFrom').value;
                state.dateRange.to = document.getElementById('dateTo').value;
            } else { customBox.classList.add('hidden'); }
            route(state.currentPage);
        }

        function exportCSV(tableId, filename) {
            const table = document.getElementById(tableId);
            let csv = [];
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].querySelectorAll("td, th");
                // Skip rows without td/th (like filter row) and skip action column
                if(cols.length === 0 || table.rows[i].classList.contains('border-b')) continue;
                for (let j = 0; j < cols.length - 1; j++) row.push('"' + cols[j].innerText.trim().replace(/"/g, '""') + '"');
                csv.push(row.join(","));
            }
            const blob = new Blob([csv.join("\n")], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.setAttribute('href', url); a.setAttribute('download', filename);
            a.click();
        }

                html += `<input required name="name" placeholder="Name" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl dark:text-white outline-none">

            html += `<div class="flex space-x-4"><button type="button" onclick="closeModal()" class="flex-1 py-4 bg-slate-100 dark:bg-slate-800 dark:text-white rounded-2xl font-bold">CANCEL</button>
